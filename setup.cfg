[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=service

[coverage:report]
show_missing = True

[flake8]
# Ignoriert Fehler in __init__ Dateien und erlaubt längere Zeilen
per-file-ignores = */__init__.py: F401 E402
max-line-length = 127

[pylint.'MESSAGES CONTROL']
# E1101 deaktiviert Warnungen für "dynamische" Member, was bei Flask/SQLAlchemy oft hilft
disable=C0111,C0103,E1101
max-line-length = 127